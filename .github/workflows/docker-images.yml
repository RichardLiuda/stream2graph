name: Build And Publish Images

on:
    push:
        branches:
            - main
            - master
            - ReleaseOnServer
    workflow_dispatch:

env:
    REGISTRY: ghcr.io

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - service: api
                      dockerfile: Dockerfile.api
                      image_name: stream2graph-api
                    - service: web
                      dockerfile: Dockerfile.web
                      image_name: stream2graph-web

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_name }}
                  tags: |
                      type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || github.ref == 'refs/heads/ReleaseOnServer' }}
                      type=ref,event=branch
                      type=sha

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./${{ matrix.dockerfile }}
                  push: true
                  platforms: linux/amd64
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
