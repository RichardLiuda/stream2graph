<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stream2Graph Realtime Studio</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">S2G</div>
          <div class="brand-text">
            <h1>Stream2Graph 讨论画布</h1>
            <p>实时整理讨论重点与关系</p>
          </div>
        </div>
        <div class="top-actions">
          <button id="btn-primary-action" class="btn primary">开始整理</button>
          <button id="btn-voice-action" class="btn secondary">开始语音</button>
          <details id="more-actions-menu" class="action-menu">
            <summary class="action-menu-trigger">更多</summary>
            <div class="action-menu-panel">
              <button id="btn-load-sample" class="menu-btn">加载示例</button>
              <button id="btn-run-eval" class="menu-btn">运行实时评测</button>
              <button id="btn-stop-mic" class="menu-btn">停止语音</button>
              <button id="btn-live-snapshot" class="menu-btn">保存进度</button>
              <button id="btn-save-report" class="menu-btn">导出报告</button>
            </div>
          </details>
        </div>
      </header>

      <main class="main-grid">
        <section class="panel spine-panel">
          <div class="panel-head">
            <div>
              <h2>讨论脉络</h2>
              <p>按发言顺序查看每一轮整理结果</p>
            </div>
            <div class="live-pill">
              <span>会话状态</span>
              <strong id="live-session-status">未启动</strong>
            </div>
          </div>

          <details class="drawer" open>
            <summary>输入内容</summary>
            <label class="field">
              <span>Transcript（每行 `speaker|text|expected_intent`）</span>
              <textarea id="transcript-input" rows="10" spellcheck="false"></textarea>
            </label>
          </details>

          <details class="drawer">
            <summary>高级设置</summary>
            <div class="field-row">
              <label class="field">
                <span>时间缩放</span>
                <input id="time-scale" type="number" min="0.1" step="0.1" value="1.0" />
              </label>
              <label class="field">
                <span>模式</span>
                <select id="realtime-mode">
                  <option value="false" selected>离线回放</option>
                  <option value="true">实时回放</option>
                </select>
              </label>
            </div>
            <div class="field-row">
              <label class="field">
                <span>Wait-k Base</span>
                <input id="base-wait-k" type="number" min="1" max="8" value="2" />
              </label>
              <label class="field">
                <span>Wait-k Max</span>
                <input id="max-wait-k" type="number" min="1" max="12" value="4" />
              </label>
            </div>
            <label class="field">
              <span>识别语言</span>
              <select id="speech-lang">
                <option value="zh-CN" selected>中文（zh-CN）</option>
                <option value="en-US">English (en-US)</option>
                <option value="ja-JP">日本語 (ja-JP)</option>
              </select>
            </label>
            <label class="field">
              <span>实时转写日志</span>
              <textarea id="live-transcript-log" rows="8" readonly></textarea>
            </label>
          </details>

          <details class="drawer">
            <summary>研究与导出（可选）</summary>
            <label class="field">
              <span>报告标题</span>
              <input id="report-title" type="text" value="realtime_ui_run" />
            </label>
            <label class="field">
              <span>报告备注（可选）</span>
              <textarea id="report-notes" rows="4" spellcheck="false"></textarea>
            </label>
            <label class="field">
              <span>Dataset 目录（仓库内绝对路径）</span>
              <input
                id="dataset-dir"
                type="text"
                value="/home/lin-server/stream2graph/versions/v3_2026-02-27_latest_9k_cscw/dataset/stream2graph_dataset/compliant_v3_repaired_20260228"
              />
            </label>
            <label class="field">
              <span>抽样文件数（0=全量）</span>
              <input id="max-files" type="number" min="0" value="800" />
            </label>
            <button id="btn-unified-eval" class="btn secondary full">运行统一评测</button>
          </details>

          <details class="drawer compact-toolbar">
            <summary>筛选与定位</summary>
            <div class="spine-toolbar">
              <label class="field compact">
                <span>说话人</span>
                <select id="speaker-filter"></select>
              </label>
              <label class="field compact">
                <span>动作</span>
                <select id="action-filter"></select>
              </label>
              <button id="btn-clear-focus" class="btn ghost small">清除聚焦</button>
            </div>
          </details>

          <div class="spine-summary">
            <strong id="spine-count">0</strong>
            <span id="spine-caption">当前还没有梳理片段</span>
          </div>

          <div id="conversation-spine" class="conversation-spine"></div>
        </section>

        <section class="panel stage-panel">
          <div class="stage-head">
            <div>
              <h2>讨论画布</h2>
              <p id="stage-subtitle">默认展示工作图，可切换观点图和回放</p>
            </div>
            <div class="stage-head-right">
              <div class="view-switcher">
                <button id="btn-view-work" class="seg-btn active">工作图</button>
                <button id="btn-view-perspective" class="seg-btn">观点图</button>
                <button id="btn-view-replay" class="seg-btn">回放</button>
              </div>
              <div class="stage-tools">
                <button id="btn-play" class="btn ghost">播放</button>
                <button id="btn-pause" class="btn ghost">暂停</button>
                <button id="btn-reset" class="btn ghost">重置</button>
              </div>
            </div>
          </div>

          <div id="selection-summary" class="selection-summary"></div>

          <div class="stage-canvas">
            <svg id="graph-svg" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid meet"></svg>
            <div class="canvas-orb orb-a"></div>
            <div class="canvas-orb orb-b"></div>
            <div class="canvas-legend">
              <span class="legend-dot dot-new">新增</span>
              <span class="legend-dot dot-contested">争议</span>
              <span class="legend-dot dot-consensus">共识</span>
              <span class="legend-dot dot-pending">待确认</span>
            </div>
          </div>

          <div class="scrubber-panel">
            <div class="scrubber-row">
              <div class="scrubber-copy">
                <strong id="timeline-caption">等待 update</strong>
                <span id="scrubber-value">0 / 0</span>
              </div>
              <input id="scrubber" type="range" min="0" max="0" value="0" disabled />
            </div>
            <div id="timeline-track" class="timeline-track"></div>
          </div>
        </section>

        <section class="panel insight-panel">
          <div class="panel-head">
            <div>
              <h2>讨论助手</h2>
              <p>帮你快速看到当前重点、分歧和下一步建议</p>
            </div>
          </div>

          <div class="insight-block">
            <h3>当前焦点</h3>
            <div id="current-focus" class="focus-card"></div>
          </div>

          <div class="insight-block">
            <div class="insight-grid">
              <div>
                <h3>分歧</h3>
                <div id="conflict-list" class="insight-list"></div>
              </div>
              <div>
                <h3>共识</h3>
                <div id="consensus-list" class="insight-list"></div>
              </div>
            </div>
            <h3>未闭合分支</h3>
            <div id="open-branches-list" class="insight-list"></div>
          </div>

          <div class="insight-block">
            <h3>下一步建议</h3>
            <div id="next-prompts-list" class="prompt-list"></div>
          </div>

          <details class="drawer compact">
            <summary>系统表现与实验详情（可选）</summary>
            <div class="metrics-grid">
              <div class="metric-card">
                <span>响应速度</span>
                <strong id="m-e2e-p95">-</strong>
              </div>
              <div class="metric-card">
                <span>理解准确</span>
                <strong id="m-intent-acc">-</strong>
              </div>
              <div class="metric-card">
                <span>画面抖动</span>
                <strong id="m-flicker">-</strong>
              </div>
              <div class="metric-card">
                <span>布局稳定</span>
                <strong id="m-mental">-</strong>
              </div>
            </div>
            <pre id="eval-summary" class="json-box"></pre>
            <pre id="unified-summary" class="json-box"></pre>
            <pre id="report-summary" class="json-box"></pre>
          </details>
        </section>
      </main>
    </div>

    <div id="toast" class="toast"></div>
    <script src="./app.js"></script>
  </body>
</html>
